# script for bq7037 family

interface zynqswd



reset_config none
zynq_swd_clk_freq 2000000
zynq_swd_enable_write_batching 1


# __________________________
source [find target/swj-dp.tcl]
source [find mem_helper.tcl]

if { [info exists CHIPNAME] } {
   set _CHIPNAME $CHIPNAME
} else {
   set _CHIPNAME bq7037
}

set _ENDIAN little

# Work-area is a space in RAM used for flash programming
# using 4kb as default
if { [info exists WORKAREASIZE] } {
   set _WORKAREASIZE $WORKAREASIZE
} else {
   set _WORKAREASIZE 0x1000
}

#jtag scan chain
if { [info exists CPUTAPID] } {
   set _CPUTAPID $CPUTAPID
} else {
   set _CPUTAPID 0x0bc11477
   # using the SWD DPIDR
}

# swj_newdap is for JTAG
swj_newdap $_CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id $_CPUTAPID
# dap - Debug Access Port
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

echo "Flashing is disabled via TCL script"

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -endian $_ENDIAN -dap $_CHIPNAME.dap

$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size $_WORKAREASIZE -work-area-backup 0

#GR first parameter is the start address of the flash bank, second is the size in bytes
# size is automatically "calculated" by probing
set _FLASHNAME $_CHIPNAME.flash0
flash bank $_FLASHNAME bq7037 0x00000000 0 1 1 $_TARGETNAME
# This is a 256K chip - it has the 2nd bank
set _FLASHNAME $_CHIPNAME.flash1
flash bank $_FLASHNAME bq7037 0x000020000 0 1 1 $_TARGETNAME

# Common knowledges tells JTAG speed should be <= F_CPU/6.
# F_CPU after reset is MSI 4MHz, so use F_JTAG = 500 kHz to stay on
# the safe side.
#
# Note that there is a pretty wide band where things are
# more or less stable, see http://openocd.zylin.com/#/c/3366/
adapter_khz 500

adapter_nsrst_delay 100


reset_config srst_nogate

   cortex_m reset_config sysresetreq


$_TARGETNAME configure -event reset-init {
   echo "reset-init has been called"
	# CPU comes out of reset with MSI_ON | MSI_RDY | MSI Range 6 (4 MHz).
	# Use MSI 24 MHz clock, compliant even with VOS == 2.
	# 3 WS compliant with VOS == 2 and 24 MHz.

	# Boost JTAG frequency
	adapter_khz 4000
}

$_TARGETNAME configure -event reset-start {
   echo "reset-start has been called"
	# Reset clock is MSI (4 MHz)
	adapter_khz 500
}

$_TARGETNAME configure -event examine-end {
   echo "examine-end has been called"
}

$_TARGETNAME configure -event trace-config {
   echo "trace-config has been called"
	# Set TRACE_IOEN; TRACE_MODE is set to async; when using sync
	# change this value accordingly to configure trace pins
	# assignment
}
