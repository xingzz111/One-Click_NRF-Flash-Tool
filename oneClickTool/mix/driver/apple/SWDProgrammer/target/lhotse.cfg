# script for Lhotse and Kamet programming

source [find target/swj-dp.tcl]
source [find mem_helper.tcl]

if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME lhotse
}

set _ENDIAN little

#jtag scan chain
if { [info exists CPUTAPID] } {
	set _CPUTAPID $CPUTAPID
} else {
	set _CPUTAPID 0x2ba01477
}

swj_newdap $_CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

if {[using_jtag]} {
	jtag newtap $_CHIPNAME bs -irlen 5
}

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -endian $_ENDIAN -dap $_CHIPNAME.dap

adapter_khz 2000

adapter_nsrst_delay 100
if {[using_jtag]} {
 jtag_ntrst_delay 100
}

reset_config srst_nogate

if {![using_hla]} {
	# if srst is not fitted use SYSRESETREQ to
	# perform a soft reset
	cortex_m reset_config sysresetreq
}

$_TARGETNAME configure -event examine-end {
	# Enable debug during low power modes (uses more power)
	# DBGMCU_CR |= DBG_STANDBY | DBG_STOP | DBG_SLEEP
	mmw 0xE0042004 0x00000007 0

	# Stop watchdog counters during halt
	# DBGMCU_APB1_FZ |= DBG_IWDG_STOP | DBG_WWDG_STOP
	mmw 0xE0042008 0x00001800 0
}

$_TARGETNAME configure -event trace-config {
	# Set TRACE_IOEN; TRACE_MODE is set to async; when using sync
	# change this value accordingly to configure trace pins
	# assignment
	mmw 0xE0042004 0x00000020 0
}

$_TARGETNAME configure -event reset-init {
	# Configure PLL to boost clock to HSI x 4 (64 MHz)
	mww 0x40023804 0x08012008	;# RCC_PLLCFGR 16 Mhz /8 (M) * 128 (N) /4(P)
	mww 0x40023C00 0x00000102	;# FLASH_ACR = PRFTBE | 2(Latency)
	mmw 0x40023800 0x01000000 0 ;# RCC_CR |= PLLON
	sleep 10					;# Wait for PLL to lock
	mmw 0x40023808 0x00001000 0 ;# RCC_CFGR |= RCC_CFGR_PPRE1_DIV2
	mmw 0x40023808 0x00000002 0 ;# RCC_CFGR |= RCC_CFGR_SW_PLL

	# Boost JTAG frequency
	adapter_khz 8000
}

$_TARGETNAME configure -event reset-start {
	# Reduce speed since CPU speed will slow down to 16MHz with the reset
	adapter_khz 2000
}

gdb_port disabled
telnet_port disabled
tcl_port disabled

######################################################################
# defines
set COMMAND_MAGIC	0x2000CC20		;# REG_CMD_MAGIC_ADDR
set COMMAND_LEN		0x2000CC24		;# REG_CMD_LEN_ADDR
set COMMAND_CMD		0x2000CC28		;# REG_CMD_ID_ADDR
set FLASH_DEST		0x2000CC2C		;# REG_CMD_PLD_ADDR
set FLASH_LEN		0x2000CC30
set FLASH_ERASE		0x2000CC34
set FLASH_PAYLOAD	0x2000CC38

set OTP_DEST		0x2000CC2C		;# REG_CMD_PLD_ADDR
set OTP_LEN			0x2000CC30
set OTP_OVERWRITE	0x2000CC34
set OTP_HV_MODE		0x2000CC38
set OTP_PAYLOAD		0x2000CC3C

set COMMAND_DONE_ADDR_ADDR 0x2000CC0C	;# REG_CMD_DONE_ADDR_ADDR

set COMMAND_MAGIC_VALUE 0xFEFEFEFE
set RESULT_DONE   0x2000CC00		;# REG_CMD_DONE_ADDR
set RESULT_STATUS 0x2000CC04		;# REG_CMD_RES_ADDR

set OTP_FIRST_FRAME_ADDRESS 0x40018104

# 100 KB
set MAX_FLASH_PAYLOAD_LEN 0x19000

#for booaloader we have a special location for checking if opt has been programmed
set booatloader_otp_loation 0x40018104

######################################################################

# manifest.txt format: <binary_name><whitespace><offset><whitespace><md5><whitespace><type>
# b393-lhotse-bl2-dev2.bin		0x00003000	c52b5b2156ac48bf271a5a72e8749518	FLASH
# b393_boot_config_bank_1.bin	0x0000D000	b1a32b2f960aa1b8487233c2aa2002c9	FLASH
# b393-map.bin					0x00101000	870929107746a145e089cf25562adfb5	FLASH
# b393-lhotse-app-dev2.bin		0x00104000	7143116eb6e0b3b5219e2221b9c0779a	FLASH
# b393-kamet-app-dev2.bin		0x00184000	b30da72446b6494511f4945e11235087	FLASH
# b393-stred-robust-dev2.bin	0x001A3000	b5547a27d0ba5c954df5a3090de54448	FLASH
# b393-lhotse-bl1-dev2.bin		0x20000000	somehashvaluedontknowwhatitisnow	OTP_FRAME

# EN_JUMP_SRAM.bin	0x400180F8	f6b9068e3abc87a27208835b067ad0b3	OTP_DATA

# v50
# b393-lhotse-bl2-dev2-HASH.bin	0x4001FEE0	somehashvaluedontknowwhatitisnow	OTP_DATA
# b393_constant_otp_fuses.bin	0x4001FFE0	somehashvaluedontknowwhatitisnow	OTP_DATA

# after v50
# b393-lhotse-bl2-dev2-HASH.bin	0x40027EE0	somehashvaluedontknowwhatitisnow	OTP_DATA
# b393_constant_otp_fuses.bin	0x40027FE0	somehashvaluedontknowwhatitisnow	OTP_DATA

proc get_image_manifest { filepath } {
	set image_manifest [dict create]
	set fp [open $filepath r]
	while {[gets $fp line]!=-1} {
		if {[regexp {(\S+)\s+(\S+)\s+(\S+)\s+(\S+)} $line match binary offset md5 type]} {
			set info [dict create]
			dict set info offset $offset
			dict set info md5 $md5
			dict set info type $type
			dict set image_manifest $binary $info
		}
	}
	close $fp
	return $image_manifest
}

proc verify_firmware_md5 { md5 filepath } {
	set cal_md5 [lindex [split [exec md5sum $filepath]] 0]
	echo "lhotse:    $filepath $cal_md5 (cal) $md5 (exp)"

	if {$cal_md5 == $md5} {
		return 1
	} else {
		echo "lhotse:    MD5 ERROR"
		return 0
	}
}

proc write_otp_frame { address length payload_file } {

	global COMMAND_MAGIC
	global COMMAND_LEN
	global COMMAND_CMD
	global OTP_DEST
	global OTP_LEN
	global OTP_OVERWRITE
	global OTP_HV_MODE
	global OTP_PAYLOAD
	global COMMAND_DONE_ADDR_ADDR
	global COMMAND_MAGIC_VALUE
	global RESULT_DONE
	global RESULT_STATUS
	
	echo "lhotse:  write_otp_frame size $length"
	# echo "lhotse:    OTP_PAYLOAD = $OTP_PAYLOAD"

	# Halt processor
	halt

	echo "lhotse:    continuing after halt"

	# reset previous results
	mww $RESULT_DONE   0
	mww $RESULT_STATUS 0

	# Load the breakpoint address
	set bp_address [ mrw $COMMAND_DONE_ADDR_ADDR ]
	echo "otp bp_address $bp_address"

	# Prepare command header
	mww $COMMAND_MAGIC 0
	mww $COMMAND_LEN   1
	mww $COMMAND_CMD   5

	mww $OTP_DEST      $address
	mww $OTP_LEN       $length
	mww $OTP_OVERWRITE 0
	mww $OTP_HV_MODE   0	;# DEVBOARD wo HV supply.  Use 1 for Factory!


	echo "lhotse:    loading image..."
	# Load payload to memory
	load_image $payload_file $OTP_PAYLOAD


	# Set magic value to indicate valid command
	mww $COMMAND_MAGIC $COMMAND_MAGIC_VALUE

	bp $bp_address 2 hw

	# Let processor run until the breakpoint is hit
	echo "lhotse:    image loaded to device's memory..."
	resume 
	wait_halt 5000
	echo "lhotse:    image loaded to device's memory done"
	
	# Clear breakpoints for next time
	rbp $bp_address	

	# Check results
	set done [ mrw $RESULT_DONE ]
	set status [ mrw $RESULT_STATUS ]

	# Allow flasher fw to keep running
	resume

	echo "lhotse:    write_otp_frame done = $done"
	echo "lhotse:    write_otp_frame status = $status"
	# done == 1 and status == 0 indicates success.
	# Return an error otherwise
	if {$done == 1 && $status == 0} {
		# Success
		return 1  
	}
	# Errored
	return 0
}

proc write_otp_raw { offset length payload_file } {

	global COMMAND_MAGIC
	global COMMAND_LEN
	global COMMAND_CMD
	global OTP_DEST
	global OTP_LEN
	global OTP_OVERWRITE
	global OTP_HV_MODE
	global OTP_PAYLOAD
	global COMMAND_DONE_ADDR_ADDR
	global COMMAND_MAGIC_VALUE
	global RESULT_DONE
	global RESULT_STATUS
	
	set hex_offset [format 0x%x $offset]
	echo "lhotse:  write_otp_raw at offset $hex_offset size $length"
	# echo "lhotse:    OTP_PAYLOAD = $OTP_PAYLOAD"

	# Halt processor
	halt

	echo "lhotse:    continuing after halt"

	# reset previous results
	mww $RESULT_DONE   0
	mww $RESULT_STATUS 0

	# Load the breakpoint address
	set bp_address [ mrw $COMMAND_DONE_ADDR_ADDR ]

	# Prepare command header
	mww $COMMAND_MAGIC 0
	mww $COMMAND_LEN   1
	mww $COMMAND_CMD   6

	mww $OTP_DEST      $offset
	mww $OTP_LEN       $length
	mww $OTP_OVERWRITE 0
	mww $OTP_HV_MODE   1


	echo "lhotse:    write_otp_raw loading image..."
	# Load payload to memory
	load_image $payload_file $OTP_PAYLOAD bin

	echo "lhotse:    write_otp_raw loading image returned"


	# Set magic value to indicate valid command
	mww $COMMAND_MAGIC $COMMAND_MAGIC_VALUE

	bp $bp_address 2 hw

	# Let processor run until the breakpoint is hit
	echo "lhotse:    image loaded to device's memory..."
	resume 
	wait_halt 5000
	echo "lhotse:    image loaded to device's memory done"
	
	# Clear breakpoints for next time
	rbp $bp_address	

	# Check results
	set done [ mrw $RESULT_DONE ]
	set status [ mrw $RESULT_STATUS ]

	# Allow flasher fw to keep running
	resume

	echo "lhotse:    write_otp_raw done = $done"
	echo "lhotse:    write_otp_raw status = $status"
	# done == 1 and status == 0 indicates success.
	# Return an error otherwise
	if {$done == 1 && $status == 0} {
		# Success
		return 1  
	}
	# Errored
	return 0
}

proc read_otp_chunk { otp_address length output_file } {
	global COMMAND_MAGIC
	global COMMAND_LEN
	global COMMAND_CMD
    global COMMAND_MAGIC_VALUE

	global FLASH_DEST
	global COMMAND_DONE_ADDR_ADDR

	global RESULT_DONE
	global RESULT_STATUS
	
    halt

	# reset previous results
	mww $RESULT_DONE   0
	mww $RESULT_STATUS 0
	
    # Prepare command header
	mww $COMMAND_MAGIC  0
	mww $COMMAND_LEN    1
	mww $COMMAND_CMD    4

	# populate frame payload
	mww $FLASH_DEST $otp_address
	mww [expr $FLASH_DEST + 4] $FLASH_DEST
	mww [expr $FLASH_DEST + 8] $length


	# Set magic value to indicate valid command
	mww $COMMAND_MAGIC $COMMAND_MAGIC_VALUE

    set bp_address [mrw $COMMAND_DONE_ADDR_ADDR]

	# set breakpoint
	bp $bp_address 2 hw

    # Run til breakpoint
    resume
	wait_halt 5000

	# clear breakpoint
	rbp $bp_address

	# Check results
	set done [ mrw $RESULT_DONE ]
	set status [ mrw $RESULT_STATUS ]

	# Allow flasher fw to keep running
	resume

	echo "lhotse:    read_otp_chunk done = $done"
	echo "lhotse:    read_otp_chunk status = $status"

    # done == 1 and status == 0 indicates success.
	# Return an error otherwise
	if {$done == 1 && $status == 0} {
        dump_image $output_file $FLASH_DEST $length
		# Success
		return 1  
	}
	# Errored
	return 0
}

