proc read_otp_firmware { otp_address length outbinfile } {
    set result 1
    set fp [open $outbinfile w]

	set payload_file [file tempfile]

	set result [read_otp_chunk $otp_address $length $payload_file]

	if {$result == 1} {
		# Append contents of $payload_file to $outbinfile
		set ifp [open $payload_file r]
		puts -nonewline $fp [read $ifp]
		close $ifp
	}

	file delete $payload_file

	close $fp

	return $result
}

proc read_firmware { flash_offset length outbinfile } {
    global MAX_FLASH_PAYLOAD_LEN

    set result 1
    set fp [open $outbinfile w]

    set remaining $length
    while { $remaining > 0 } {
        set readlen [min $remaining $MAX_FLASH_PAYLOAD_LEN]

        set payload_file [file tempfile]

        set result [read_flash_chunk $flash_offset $readlen $payload_file]

        if {$result == 1} {
            # Append contents of $payload_file to $outbinfile
			set ifp [open $payload_file r]
			puts -nonewline $fp [read $ifp]
			close $ifp
        }

        file delete $payload_file

        if {$result != 1} {
            break
        }

        set flash_offset [expr $flash_offset + $readlen]
        set remaining [expr $remaining - $readlen]
    }

	close $fp

	return $result
}


proc get_file_chunk { infile offset size outfile } {
	set ifp [open $infile r]
	set ofp [open $outfile w]
	seek $ifp $offset
	puts -nonewline $ofp [read $ifp $size]
	close $ifp
	close $ofp
}

proc min {a b} { return [expr $a > $b ? $b : $a]}

proc comp_file {file1 file2} {
    set equal 0
    if {[file size $file1] == [file size $file2]} {
        set fh1 [open $file1 r]
        set fh2 [open $file2 r]
        set equal [string equal [read $fh1] [read $fh2]]
        close $fh1
        close $fh2
    }
    return $equal
}

proc write_otp_bootloader { otp_address binfile } {

	echo "------------"
	echo "lhotse:  write_otp_bootloader $binfile to otp frames. To copy into $otp_address"

	# halt
	#for booaloader we have a special location for checking if opt has been programmed
	global booatloader_otp_loation
	set BLANK_CHECK [mrw $booatloader_otp_loation]
	echo "booatloader_otp_loation $BLANK_CHECK"
	# resume
	if {$BLANK_CHECK != 0} {
		echo "lhotse:    OTP address is non-blank ($BLANK_CHECK).  SKIPPING."
		return 2
	}


	set result 1
	set fp [open $binfile r]	

	# OTP is always smaller than the splitting requirement. send as one chunk
	set length [ file size $binfile ]
	
	set file_offset  0
	set payload_file [file tempfile]
	get_file_chunk $binfile $file_offset $length $payload_file

	set result [write_otp_frame $otp_address $length $payload_file]

	file delete $payload_file

	close $fp

	return $result
}

proc write_otp_data { otp_address binfile } {

	echo "------------"
	echo "lhotse:  write_otp_data $binfile as OTP. Writing to address $otp_address"

	# halt
	set BLANK_CHECK [mrw $otp_address]
	# resume
	if {$BLANK_CHECK != 0} {
		echo "lhotse:    OTP address is non-blank ($BLANK_CHECK).  SKIPPING."
		return 2
	}

	set result 1
	set fp [open $binfile r]	

	# OTP is always smaller than the splitting requirement. send as one chunk
	set length [ file size $binfile ]
	
	set file_offset  0
	set payload_file [file tempfile]
	get_file_chunk $binfile $file_offset $length $payload_file

	set result [write_otp_raw $otp_address $length $payload_file]

	file delete $payload_file

	close $fp

	return $result
}

proc write_firmware { flash_offset binfile } {

	global MAX_FLASH_PAYLOAD_LEN
	echo "------------"
	echo "lhotse:  write_firmware $binfile to offset $flash_offset"

	set result 1
	set fp [open $binfile r]	

	# How many bytes remaining to be written?
	set remaining [ file size $binfile ]
	set file_offset 0
	while { $remaining > 0 } {
		set length [min $remaining $MAX_FLASH_PAYLOAD_LEN]
		
		set payload_file [file tempfile]
		get_file_chunk $binfile $file_offset $length $payload_file

		set result [write_flash_chunk $flash_offset $length $payload_file]

		set file_offset [expr $file_offset + $length]
		set flash_offset [expr $flash_offset + $length]
		set remaining [expr $remaining - $length]

		file delete $payload_file

		if {$result != 1} {
			break
		}
	}

	close $fp

	return $result
}

proc verify_otp_data { filename address } {
	echo "lhotse:  verify otp $filename at $address..."
	set filesize [file size $filename]
	set verify_tmp_file [file tempfile]
	set result [read_otp_firmware $address $filesize $verify_tmp_file]
	
	if {$result == 1} {
		set result [comp_file $verify_tmp_file $filename]
		if {$result == 0} {
			echo "ERROR:  FILE IS DIFFERENT!  $verify_tmp_file"
			return $result
		}
	}
	
	if {[file exist $verify_tmp_file]} {
		file delete $verify_tmp_file
	}

	return $result
}

proc verify_otp_bootloader { filename address } {
	echo "lhotse:  verify otp bootloader $filename"
	set filesize [file size $filename]
	set verify_tmp_file [file tempfile]

	# Read the first OTP frame header 
	global OTP_FIRST_FRAME_ADDRESS
	set size [mrh [expr $OTP_FIRST_FRAME_ADDRESS + 8]]
	echo "lhotse:    verify_otp_bootloader filesize $filesize"
	echo "lhotse:    verify_otp_bootloader contentsize $size"

	if {$size == $filesize} {
		set result [read_otp_firmware [expr $OTP_FIRST_FRAME_ADDRESS + 0xE] $filesize $verify_tmp_file]
	} else {
		set result 20
	}
	echo "lhoste:    otp read result $result"

	if {$result == 1} {
		set result [comp_file $verify_tmp_file $filename]
		if {$result == 0} {
			echo "ERROR:  FILE IS DIFFERENT!"
		} else {
			echo "lhotse:  verify otp bootloader $filename success"
		}
	}
	
	if {[file exist $verify_tmp_file]} {
		file delete $verify_tmp_file
	}

	return $result
}

proc verify_firmware { filename address } {
	echo "lhotse:  verify_firmware $filename at $address..."
	set filesize [file size $filename]
	set verify_tmp_file [file tempfile]
	set result [read_firmware $address $filesize $verify_tmp_file]
	
	if {$result == 1} {
		set result [comp_file $verify_tmp_file $filename]
		if {$result == 0} {
			echo "ERROR:  FILE IS DIFFERENT!"
		} else {
			echo "lhotse: verify $filename success"
		}
	}
	
	if {[file exist $verify_tmp_file]} {
		file delete $verify_tmp_file
	}

	return $result
}

proc disable_flash_protection {} {
	echo "starting disable_flash_protection"
	if {[catch {init}] != 0} {
		echo "** OpenOCD init failed **" 
        return
	}

	mww 0x400014F8 1
	echo "disable remap"
	mww 0x40001408 0
	echo "Trigger SW reset"
	mww 0x40000070 1
	sleep 500
	shutdown

}


proc load_lhotse_flasher_image {filename} {
	echo "load_lhotse_flasher_image: filename: $filename"
	# Check if flasher image exist
	if {[file isdirectory $filename] == 1} {
		set flasher_image "$filename/b393-lhotse-flasher-dev2.bin"
	} else {
		set flasher_image [file join [file dirname $filename] "b393-lhotse-flasher-dev2.bin"]
	}
	if {[file exists $flasher_image] != 1} {
		echo "ERROR - Flasher image not found at $flasher_image"
		return 0
	}
	set file_hash [exec md5sum $flasher_image]
	echo "load_lhotse_flasher_image flasher_image: $flasher_image, md5: $file_hash"
	halt

	
	global booatloader_otp_loation

	echo "Loading flasher image $flasher_image ..."
	load_image $flasher_image 0x20000000
	mww 0x40001408 1
	mww 0x40000070 2
	echo "Loading flasher image loaded"

	return 1
}

proc program {filename args} {
	# This overrides the startup.tcl's version of program() helper function

	echo "lhotse Program filename: $filename"
	
	set preverify 0
	set verify 0
	set reset 0
	set exit 0

	set dbg_verify_only 0

	foreach arg $args {
		echo "lhotse: current arg: $arg"
		if {[string equal $arg "preverify"]} {
			set preverify 1
		} elseif {[string equal $arg "verify"]} {
			set verify 1
		} elseif {[string equal $arg "reset"]} {
			set reset 1
		} elseif {[string equal $arg "exit"]} {
			set exit 1
		} elseif {[string equal $arg "dbg_verify_only"]} {
			set dbg_verify_only 1
			set verify 1
			echo "*** VERIFY ONLY DEBUG ***"
		} else {
			set address $arg
		}
	}

	# make sure init is called
	if {[catch {init}] != 0} {
		echo "** OpenOCD init failed **" 
        return
	}

	set RESET_SOURCE [mrw 0x40000074]
	echo "lhotse RESET_SOURCE reg: $RESET_SOURCE"
	#clear reset status
	mww 0x40000074 1024

	# reset target and call any init scripts
#	set attempt 0
#	set reset_status 0
#	while { 1 } {
#		set reset_status [catch {reset init}]
#		if {$reset_status != 0 && $attempt < 10} {
#			echo "** Unable to reset target, retrying..."
#			incr attempt
#		} else {
#			break
#		}
#	}
#	if {$reset_status != 0} {
#		echo "** Unable to reset target **"
#       return
#	}

	echo "** Programming Started **"

	set result [load_lhotse_flasher_image $filename]
	sleep 500

	set otp_skips {}

	echo "lhotse: filename: $filename"
	if {$result == 1 && $dbg_verify_only == 0} {

		# Program Flash images
		if {[file tail $filename] == "manifest.txt"} {
			echo "filename is manifest.txt"
			# program a set of file in defined by manifest.txt
			set image_manifest [get_image_manifest $filename]

			# Verify source binaries' md5 before programming
			foreach image_name [dict keys $image_manifest] {
				set image_info [dict get $image_manifest $image_name]
				set bundle_path [file dirname $filename]
				set md5 [dict get $image_info md5]
				set result [verify_firmware_md5 $md5 [file join $bundle_path $image_name]]
				if {$result != 1} {
					echo "Binary verify failed"
					break
				}
			}

			# Start programming each binary in manifest.
			if {$result == 1} {
				echo "Starting programming of binary in manifest "
				foreach image_name [dict keys $image_manifest] {
					set image_info [dict get $image_manifest $image_name]
					set bundle_path [file dirname $filename]
					set address [dict get $image_info offset]
					set type [dict get $image_info type]
					if {$type == "FLASH"} {
						set result [write_firmware $address [file join $bundle_path $image_name]]
					}
					if {$type == "OTP_FRAME"} {
						set result [write_otp_bootloader $address [file join $bundle_path $image_name]]
						if {$result == 2} {
							lappend otp_skips $image_name
							set result 1
						}
					}
					if {$type == "OTP_DATA"} {
						set result [write_otp_data $address [file join $bundle_path $image_name]]
						if {$result == 2} {
							lappend otp_skips $image_name
							set result 1
						}
					}
					if {$result != 1} {
						break
					}
					echo "lhotse: image_name: $image_name programmed"
				}
			}
		} else {
			# program a single file
			set result [write_firmware $address $filename]
		}
	}

	if {$result != 1} {
		echo "** Programming Failed **"
	}

	if {$result == 1 && $verify == 1} {
		echo "** Verify Started **"
		
		if {[file tail $filename] == "manifest.txt"} {
			# verify a set of file in defined by manifest.txt
			set image_manifest [get_image_manifest $filename]
			foreach image_name [dict keys $image_manifest] {
				set image_info [dict get $image_manifest $image_name]
				set bundle_path [file dirname $filename]
				set address [dict get $image_info offset]
				set type [dict get $image_info type]
				echo " "
				if {$type == "FLASH"} {
					set res [verify_firmware [file join $bundle_path $image_name] $address]
				}
				if {$type == "OTP_FRAME"} {
					if {[lsearch -exact $otp_skips $image_name] == -1} {
						set res [verify_otp_bootloader [file join $bundle_path $image_name] $address]
					} else {
						echo "lhotse:  verify $image_name skipped because it wasn't programmed"
					}
				}
				if {$type == "OTP_DATA"} {
					if {[lsearch -exact $otp_skips $image_name] == -1} {
						set res [verify_otp_data [file join $bundle_path $image_name] $address]
					} else {
						echo "lhotse:  verify $image_name skipped because it wasn't programmed"
					}
				}
				set result [expr $result && $res]
				# if {$result != 1} {
				# 	break
				# }
			}
		} else {
			# verify single binary
			set result [verify_firmware $filename $address]
		}

		if {$result == 1} {
			echo "** Verified OK **"
		} else {
			echo "** Verify Failed **"
		}
	}

	if {$result == 1} {
		echo "** Programming Finished **"
	}
	
	if {[info exists reset]} {
		# reset target if requested
		if {$exit == 1} {
			# also disable target polling, we are shutting down anyway
			poll off
		}
		echo "** Resetting Target **"
		#mww 0x40000070 1
		reset run
	}

	if {$exit == 1} {
		shutdown
	}

}
